    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            scroll-behavior:smooth;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f5f7fa;
            color:#222;
            line-height:1.7;
            overflow-x:hidden;
        }

        header{
            position:fixed;
            top:0;
            left:0;
            width:100%;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:15px 8%;

            background:#1e7f4f;
            box-shadow:0 4px 15px rgba(0,0,0,.12);

            z-index:1000;
        }

        .logo-container{
    text-align:center;
}

.logo-container img{
    width:350px;
    max-width:90%;
    height:auto;
}

.logo-container h1{
    color:#0070c0;
    margin-top:20px;
}

    
/* MENU */

nav ul{
    display:flex;
    align-items:center;
    list-style:none;
    gap:30px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
    font-weight:500;
    transition:all .3s ease;
}

nav ul li a:hover{
    color:#d7ffe5;
}

    
/* SECTION */

section{
padding:100px 8%;
}

.section-title{
text-align:center;
margin-bottom:60px;
}

.section-title h2{
font-size:45px;
color:#003366;
}

.section-title p{
margin-top:10px;
color:#666;
}

/* ABOUT */

.about{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center;
}

.about img{
width:100%;
border-radius:20px;
}

.about-text h3{
font-size:34px;
margin-bottom:20px;
color:#003366;
}

.about-text p{
line-height:1.9;
color:#555;
}

/* STATS */

.stats{
background:#003366;
color:white;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
text-align:center;
}

.stat-box h3{
font-size:50px;
margin-bottom:10px;
}

/* SERVICES */

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.service-card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.4s;
}

.service-card:hover{
transform:translateY(-10px);
}

.service-card h3{
margin-bottom:15px;
color:#003366;
}

/* PROJECTS */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.project{
position:relative;
overflow:hidden;
border-radius:18px;
}

.project img{
width:100%;
height:300px;
object-fit:cover;
transition:.5s;
}

.project:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:25px;
background:linear-gradient(transparent,rgba(0,0,0,.85));
color:white;
}

/* CONTACT */
        
.contact{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
}

.contact-info{
background:#003366;
color:white;
padding:40px;
border-radius:20px;
}

.contact-info h3{
margin-bottom:20px;
font-size:30px;
}

.contact-form{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.contact-form form{
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}
